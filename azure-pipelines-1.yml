trigger:
- main

pool:
  name: DevOps

variables:
  terraformVersion: '1.9.8'
  tflintVersion: '0.53.0'
  tfsecVersion: '1.28.10'

stages:

###############################################################
# DEV STAGE
###############################################################

- stage: DEV
  displayName: "Terraform DEV"

  jobs:
  - job: Terraform_DEV
    displayName: "Terraform DEV Validation"

    variables:
      workingDir: '$(System.DefaultWorkingDirectory)/Root/Dev'

    steps:

    - checkout: self

    ###########################################################
    # Install Terraform
    ###########################################################

    - task: TerraformInstaller@1
      displayName: Install Terraform
      inputs:
        terraformVersion: $(terraformVersion)

    ###########################################################
    # Terraform Init
    ###########################################################

    - task: TerraformTask@5
      displayName: Terraform Init
      inputs:
        provider: azurerm
        command: init
        workingDirectory: $(workingDir)

        backendServiceArm: DevSecOPs
        backendAzureRmResourceGroupName: devsecops-rg
        backendAzureRmStorageAccountName: devsecopsstrg
        backendAzureRmContainerName: devsecopcont
        backendAzureRmKey: dev.tfstate

    ###########################################################
    # Terraform Format
    ###########################################################

    - script: |
        terraform fmt -recursive
      workingDirectory: $(workingDir)
      displayName: Terraform Format

    ###########################################################
    # Terraform Validate
    ###########################################################

    - task: TerraformTask@5
      displayName: Terraform Validate
      inputs:
        provider: azurerm
        command: validate
        workingDirectory: $(workingDir)

    ###########################################################
    # Install TFLint (direct binary download, no choco needed)
    ###########################################################

    - powershell: |
        $ErrorActionPreference = "Stop"

        $installDir = "$(Agent.ToolsDirectory)\tflint"
        New-Item -ItemType Directory -Force -Path $installDir | Out-Null

        $zipUrl = "https://github.com/terraform-linters/tflint/releases/download/v$(tflintVersion)/tflint_windows_amd64.zip"
        $zipPath = "$installDir\tflint.zip"

        Write-Host "Downloading TFLint from $zipUrl"
        Invoke-WebRequest -Uri $zipUrl -OutFile $zipPath

        Expand-Archive -Path $zipPath -DestinationPath $installDir -Force

        Write-Host "##vso[task.prependpath]$installDir"
        Write-Host "TFLint installed at $installDir"
      displayName: Install TFLint

    ###########################################################
    # Run TFLint
    # NOTE: tflint exits with a non-zero code whenever it finds
    # ANY issue, even just warnings (like missing variable types).
    # ignoreLASTEXITCODE keeps this from failing the whole pipeline.
    ###########################################################

    - powershell: |
        tflint --version
        tflint --init
        tflint
      workingDirectory: $(workingDir)
      displayName: Run TFLint
      ignoreLASTEXITCODE: true

    ###########################################################
    # Install TFSEC (direct binary download, no choco needed)
    ###########################################################

    - powershell: |
        $ErrorActionPreference = "Stop"

        $installDir = "$(Agent.ToolsDirectory)\tfsec"
        New-Item -ItemType Directory -Force -Path $installDir | Out-Null

        $exeUrl = "https://github.com/aquasecurity/tfsec/releases/download/v$(tfsecVersion)/tfsec-windows-amd64.exe"
        $exePath = "$installDir\tfsec.exe"

        Write-Host "Downloading TFSEC from $exeUrl"
        Invoke-WebRequest -Uri $exeUrl -OutFile $exePath

        Write-Host "##vso[task.prependpath]$installDir"
        Write-Host "TFSEC installed at $installDir"
      displayName: Install TFSEC

    ###########################################################
    # Run TFSEC
    # NOTE: tfsec also exits non-zero if it finds any security
    # findings. ignoreLASTEXITCODE keeps this from blocking the
    # pipeline. Review the findings in the log and fix real issues.
    ###########################################################

    - powershell: |
        tfsec --version
        tfsec .
      workingDirectory: $(workingDir)
      displayName: Run TFSEC
      ignoreLASTEXITCODE: true

    ###########################################################
    # Verify Python (use the system-installed Python already on
    # this self-hosted agent instead of downloading one from
    # GitHub)
    ###########################################################

    - powershell: |
        $ErrorActionPreference = "Stop"

        $pythonCmd = Get-Command python -ErrorAction SilentlyContinue
        if (-not $pythonCmd) {
          Write-Host "##[error]Python was not found on PATH for this agent."
          Write-Host "##[error]Please install Python 3.x once manually on this agent machine (e.g. from https://www.python.org/downloads/windows/) and ensure it is added to PATH, then re-run the pipeline."
          exit 1
        }

        python --version
      displayName: Verify Python

    ###########################################################
    # Install Checkov
    ###########################################################

    - powershell: |
        python -m pip install --upgrade pip
        pip install checkov
        checkov --version
      displayName: Install Checkov

    ###########################################################
    # Run Checkov
    # NOTE: checkov also exits non-zero when it finds failed checks.
    # ignoreLASTEXITCODE keeps this from blocking the pipeline.
    ###########################################################

    - powershell: |
        checkov -d .
      workingDirectory: $(workingDir)
      displayName: Run Checkov
      ignoreLASTEXITCODE: true

    ###########################################################
    # Terraform Plan
    ###########################################################

    - task: TerraformTask@5
      displayName: Terraform Plan
      inputs:
        provider: azurerm
        command: plan
        workingDirectory: $(workingDir)
        environmentServiceNameAzureRM: DevSecOPs


###############################################################
# QA STAGE (runs only after DEV succeeds)
###############################################################

