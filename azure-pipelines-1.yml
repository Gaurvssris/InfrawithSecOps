    ###########################################################
    # Terraform Plan
    ###########################################################

    - task: TerraformTask@5
      displayName: Terraform Plan
      inputs:
        provider: azurerm
        command: plan
        workingDirectory: $(workingDir)
        environmentServiceNameAzureRM: DevSecOPs


###############################################################
# PROD STAGE (runs only after QA succeeds)
# Tip: create an Azure DevOps Environment named "Prod" and add
