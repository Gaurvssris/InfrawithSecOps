trigger:
- main

pool:
  name: DevOps

variables:
  workingDir: '$(System.DefaultWorkingDirectory)/Root/Dev'
  terraformVersion: '1.9.8'

stages:

- stage: DEV
  displayName: "Terraform DEV"

  jobs:
  - job: Terraform_DEV
    displayName: "Terraform DEV Validation"

    steps:

    - checkout: self

    ###########################################################
    # Install Terraform
    ###########################################################

    - task: TerraformInstaller@1
      displayName: Install Terraform
      inputs:
        terraformVersion: $(terraformVersion)

    ###########################################################
    # Terraform Init
    ###########################################################

    - task: TerraformTask@5
      displayName: Terraform Init
      inputs:
        provider: azurerm
        command: init
        workingDirectory: $(workingDir)

        backendServiceArm: DevSecOPs
        backendAzureRmResourceGroupName: devsecops-rg
        backendAzureRmStorageAccountName: devsecopsstrg
        backendAzureRmContainerName: devsecopcont
        backendAzureRmKey: dev.tfstate

    ###########################################################
    # Terraform Format
    ###########################################################

    - script: |
        terraform fmt -recursive
      workingDirectory: $(workingDir)
      displayName: Terraform Format

    ###########################################################
    # Terraform Validate
    ###########################################################

    - task: TerraformTask@5
      displayName: Terraform Validate
      inputs:
        provider: azurerm
        command: validate
        workingDirectory: $(workingDir)

    ###########################################################
    # Install TFLint
    ###########################################################

    - powershell: |
        if (!(Get-Command choco -ErrorAction SilentlyContinue)) {
            Write-Host "Chocolatey is not installed."
            exit 1
        }

        choco install tflint -y

        $env:Path += ";C:\ProgramData\chocolatey\bin"

        tflint --version
      displayName: Install TFLint

    ###########################################################
    # Run TFLint
    ###########################################################

    - powershell: |
        tflint --init
        tflint
      workingDirectory: $(workingDir)
      displayName: Run TFLint

    ###########################################################
    # Install TFSEC
    ###########################################################

    - powershell: |
        choco install tfsec -y
        tfsec --version
      displayName: Install TFSEC

    ###########################################################
    # Run TFSEC
    ###########################################################

    - powershell: |
        tfsec .
      workingDirectory: $(workingDir)
      displayName: Run TFSEC

    ###########################################################
    # Install Python
    ###########################################################

    - task: UsePythonVersion@0
      inputs:
        versionSpec: '3.x'

    ###########################################################
    # Install Checkov
    ###########################################################

    - powershell: |
        python -m pip install --upgrade pip
        pip install checkov
        checkov --version
      displayName: Install Checkov

    ###########################################################
    # Run Checkov
    ###########################################################

    - powershell: |
        checkov -d .
      workingDirectory: $(workingDir)
      displayName: Run Checkov

    ###########################################################
    # Terraform Plan
    ###########################################################

    - task: TerraformTask@5
      displayName: Terraform Plan
      inputs:
        provider: azurerm
        command: plan
        workingDirectory: $(workingDir)
        environmentServiceNameAzureRM: DevSecOPs

